<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>

  <rect x="50" y="50" width="412" height="412" rx="90" fill="rgb(255, 96, 234)"/>
  
  <g filter="url(#softShadow)">
    <rect x="136" y="175" width="240" height="35" rx="17.5" fill="#1A1A1A"/>
    <rect x="136" y="245" width="240" height="35" rx="17.5" fill="#1A1A1A"/>
    <rect x="136" y="315" width="240" height="35" rx="17.5" fill="#1A1A1A"/>
  </g>
</svg>
