        <main>
            <section class="registro">
                <h1>Registro de usuarios</h1>
                <form action="./regis.html" method="get" enctype="multipart/form-data">
                    <fieldset>
                        <legend>Formulario de registro de usuarios</legend>
                        <p> <label for="name">Nombre</label><br>
                            <input type="text" name="nombre" id="name" autocomplete="off" required minlength="3">
                        </p>
                        <p>
                            <label for="nacimiento">Fecha de nacimiento</label><br>
                            <input type="date" name="fecha-nacimiento" id="nacimiento" max="2007-12-31" min="1925-01-01" required>
                        </p>
                        <p>
                            <label for="correo">Email</label><br>
                            <input type="email" name="e-correo" id="correo" autocomplete="off" required>
                        </p>
                        <p>
                            <label for="pg-wed">Pagina wed</label><br>
                            <input type="text" name="wed" id="pg-wed" autocomplete="off">
                        </p>
                        <p>
                            <label class="foto" for="foto">Foto</label><br>
                            <input type="file" name="Foto" id="foto">
                        </p>
                        <p>
                            <label for="bio">Biografía</label><br>
                            <textarea name="biografia" id="bio"></textarea>
                        </p>
                        <p>
                            <input type="submit">
                        </p>
                    </fieldset>
                </form>
            </section>
